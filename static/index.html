<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Miffy Photobooth 🐰</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Miffy Bunny Header -->
        <header>
            <div class="bunny-decor">
                <span class="bunny-ear left">🐰</span>
                <h1>🌸 Tatine Photobooth</h1>
                <span class="bunny-ear right">🐰</span>
            </div>
            <p class="subtitle">✨ Capture your cute moments! ✨</p>
        </header>

        <div class="photobooth">
            <!-- Camera Section -->
            <div class="camera-section">
                <div class="video-container">
                    <video id="video" autoplay playsinline></video>
                    <div class="camera-overlay">
                        <div class="corner tl"></div>
                        <div class="corner tr"></div>
                        <div class="corner bl"></div>
                        <div class="corner br"></div>
                    </div>
                    <!-- Bunny decoration on camera -->
                    <div class="bunny-camera-decor">
                        <span class="bunny-small">🐰</span>
                    </div>
                </div>
                
                <div class="controls">
                    <button id="captureBtn" class="capture-btn">
                        <span class="icon">📸</span> Snap!
                    </button>
                    <button id="switchCamera" class="switch-btn">
                        <span class="icon">🔄</span> Switch
                    </button>
                    <button id="galleryBtn" class="gallery-btn">
                        <span class="icon">🖼️</span> Gallery
                    </button>
                    <button id="mirrorBtn" class="mirror-btn active">
                        <span class="icon">🪞</span> Mirror
                    </button>
                </div>
                
                <div id="cameraStatus" class="camera-status">🌸 Ready to capture!</div>
            </div>

            <!-- Preview Section -->
            <div class="preview-section" id="previewSection" style="display: none;">
                <div class="preview-header">
                    <h2>🌸 Your Cute Photo 🐰</h2>
                    <span class="sparkle">✨</span>
                </div>
                <div class="preview-container">
                    <img id="capturedImage" alt="Captured photo">
                </div>
                <div class="preview-controls">
                    <button id="retakeBtn" class="retake-btn">🔄 Retake</button>
                    <button id="saveBtn" class="save-btn">💾 Save</button>
                    <button id="shareBtn" class="share-btn">📤 Share</button>
                </div>
            </div>

            <!-- Gallery Section -->
            <div class="gallery-section" id="gallerySection" style="display: none;">
                <div class="gallery-header">
                    <h2>🌟 Memory Gallery 🐰</h2>
                    <button id="closeGalleryBtn" class="close-btn">✖</button>
                </div>
                <div id="galleryGrid" class="gallery-grid"></div>
            </div>
        </div>

        <footer>
            <p>Live Love Miffy!</p>
            <div class="footer-bunnies">
                <span>🐰</span>
                <span>🌸</span>
                <span>🐰</span>
            </div>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
