<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Tatine Photobooth ✨</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>
/<body>
    <div class="container">
        <header>
            <h1>🌸 Tatine Photobooth</h1>
            <p class="subtitle">Capture your cute moments! 📸</p>
        </header>

        <div class="photobooth">
            <div class="camera-section">
                <div class="video-container">
                    <video id="video" autoplay playsinline></video>
                    <div class="camera-overlay">
                        <div class="corner tl"></div>
                        <div class="corner tr"></div>
                        <div class="corner bl"></div>
                        <div class="corner br"></div>
                    </div>
                </div>
                <div class="controls">
                    <button id="captureBtn" class="capture-btn">
                        <span class="icon">📸</span> Capture
                    </button>
                    <button id="switchCamera" class="switch-btn">
                        <span class="icon">🔄</span> Switch
                    </button>
                    <button id="galleryBtn" class="gallery-btn">
                        <span class="icon">🖼️</span> Gallery
                    </button>
                    <button id="mirrorBtn" class="mirror-btn">
                        <span class="icon">🪞</span> Mirror
                    </button>
                </div>
                <div id="cameraStatus" class="camera-status">Camera Ready 📷</div>
            </div>

            <div class="preview-section" id="previewSection" style="display: none;">
                <h2>🎀 Your Photo</h2>
                <div class="preview-container">
                    <img id="capturedImage" alt="Captured photo">
                </div>
                <div class="preview-controls">
                    <button id="retakeBtn" class="retake-btn">🔄 Retake</button>
                    <button id="saveBtn" class="save-btn">💾 Save</button>
                    <button id="shareBtn" class="share-btn">📤 Share</button>
                </div>
            </div>

            <div class="gallery-section" id="gallerySection" style="display: none;">
                <h2>🌟 Photo Gallery</h2>
                <div id="galleryGrid" class="gallery-grid"></div>
                <button id="closeGalleryBtn" class="close-btn">✖ Close</button>
            </div>
        </div>

        <footer>
            <p>Made with ❤️ by Tatine Photobooth</p>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
